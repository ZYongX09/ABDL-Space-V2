<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starfield Constellation — Apple Style</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; }
  canvas { display: block; cursor: grab; }
  canvas:active { cursor: grabbing; }
  .overlay {
    position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%);
    text-align: center; z-index: 10; pointer-events: none;
  }
  .overlay h1 {
    font-size: 2.2rem; font-weight: 700; color: #fff;
    opacity: 0; transform: translateY(24px);
    transition: all 1s cubic-bezier(0.25, 0.1, 0, 1);
    letter-spacing: 0.05em;
  }
  .overlay h1.show { opacity: 1; transform: translateY(0); }
  .overlay p {
    font-size: 0.95rem; color: rgba(255,255,255,0.45); margin-top: 10px;
    opacity: 0; transform: translateY(12px);
    transition: all 0.8s cubic-bezier(0.25, 0.1, 0, 1) 0.3s;
  }
  .overlay p.show { opacity: 1; transform: translateY(0); }
  .hint {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.25); font-size: 0.85rem; z-index: 10;
    pointer-events: none; transition: opacity 0.6s ease;
    letter-spacing: 0.1em;
  }
  .progress-track {
    position: fixed; bottom: 0; left: 0; right: 0; height: 2px;
    background: rgba(255,255,255,0.05); z-index: 10;
  }
  .progress-bar {
    height: 100%; width: 0;
    background: linear-gradient(90deg, #A8D8F0, #FFB7C5);
    transition: width 0.15s linear;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="hint" id="hint">CLICK TO BEGIN</div>
<div class="overlay" id="overlay">
  <h1 id="title">ABDL Space</h1>
  <p id="subtitle">探索 ABDL 世界</p>
</div>
<div class="progress-track"><div class="progress-bar" id="progress"></div></div>

<script>
/**
 * Starfield Constellation — 完整 Apple 风格
 *
 * 复刻细节：
 * 1. RAF 分阶段执行器：requested → start → [update, external, draw] → end
 * 2. 贝塞尔缓动：(.25,.1,0,1) 主运动 + (.1,.15,0,1) 平滑微调
 * 3. lat/lon 球面坐标相机控制
 * 4. overshoot + oscillation 动量物理
 * 5. map() 值域映射
 * 6. 粒子独立闪烁频率/相位
 * 7. delta time 帧率无关
 */

// ============================================================
// 1. 贝塞尔缓动（Apple createBezier）
// ============================================================
function createBezier(x1, y1, x2, y2) {
  const cx = 3*x1, bx = 3*(x2-x1)-cx, ax = 1-cx-bx;
  const cy = 3*y1, by = 3*(y2-y1)-cy, ay = 1-cy-by;
  function sampleX(t) { return ((ax*t+bx)*t+cx)*t; }
  function sampleY(t) { return ((ay*t+by)*t+cy)*t; }
  function solveX(x) {
    let t = x;
    for (let i = 0; i < 8; i++) {
      const err = sampleX(t) - x;
      if (Math.abs(err) < 1e-7) return t;
      const dx = (3*ax*t+2*bx)*t+cx;
      if (Math.abs(dx) < 1e-7) break;
      t -= err / dx;
    }
    return t;
  }
  return function(x) {
    if (x <= 0) return 0;
    if (x >= 1) return 1;
    return sampleY(solveX(x));
  };
}

// Apple 原始参数
const easeMain   = createBezier(0.25, 0.1, 0, 1);    // 主运动
const easeSmooth = createBezier(0.1, 0.15, 0, 1);     // 平滑微调

// ============================================================
// 2. map() 值域映射（Apple utils/map）
// ============================================================
function map(value, inMin, inMax, outMin, outMax) {
  return outMin + (outMax - outMin) * ((value - inMin) / (inMax - inMin));
}

// ============================================================
// 3. RAF 分阶段执行器（Apple RAFExecutor 完整复刻）
// ============================================================
class RAFExecutor {
  constructor() {
    this.phases = ['requested', 'start', 'update', 'external', 'draw', 'end'];
    this.phaseIndex = -1;
    this.phase = 'disabled';
    this._subscribers = {};
    this._order = [];
    this._nextSubs = {};
    this._nextOrder = [];
    this._running = false;
    this._rafId = null;
    this.lastTime = 0;
    this.rafData = { time: 0, delta: 0, fps: 0, timeNow: 0 };
    this._onFrame = this._onFrame.bind(this);
  }

  subscribe(emitter, priority) {
    this._nextSubs[emitter.id] = emitter;
    priority ? this._nextOrder.unshift(emitter.id) : this._nextOrder.push(emitter.id);
    if (!this._running) this._start();
  }

  unsubscribe(emitter) {
    delete this._nextSubs[emitter.id];
    this._nextOrder = this._nextOrder.filter(id => id !== emitter.id);
    if (Object.keys(this._nextSubs).length === 0 && Object.keys(this._subscribers).length === 0) this._stop();
  }

  _start() {
    this._running = true;
    this.lastTime = performance.now();
    this._rafId = requestAnimationFrame(this._onFrame);
  }

  _stop() {
    this._running = false;
    if (this._rafId) cancelAnimationFrame(this._rafId);
  }

  _onFrame(time) {
    if (!this._running) return;
    // 移动 next → current（Apple 风格双缓冲）
    this._subscribers = { ...this._nextSubs };
    this._order = [...this._nextOrder];

    // delta time
    const delta = Math.min(time - this.lastTime, 50);
    this.lastTime = time;
    this.rafData.delta = delta;
    this.rafData.time = time;
    this.rafData.fps = delta > 0 ? 1000 / delta : 0;
    this.rafData.timeNow = Date.now();

    // start 阶段
    this.phaseIndex = 1; this.phase = 'start';
    for (const id of this._order) {
      const e = this._subscribers[id];
      if (e && !e._destroyed) e._onFrameStart(this.rafData);
    }

    // update → external → draw 阶段
    for (let pi = 2; pi <= 4; pi++) {
      this.phaseIndex = pi;
      this.phase = this.phases[pi];
      for (const id of this._order) {
        const e = this._subscribers[id];
        if (e && !e._destroyed) e.trigger(this.phase, this.rafData);
      }
    }

    // end 阶段
    this.phaseIndex = 5; this.phase = 'end';
    for (const id of this._order) {
      const e = this._subscribers[id];
      if (e && !e._destroyed) e._onFrameEnd(this.rafData);
    }

    this._rafId = requestAnimationFrame(this._onFrame);
  }
}

// 简化 EventEmitter（Apple ac-event-emitter-micro）
let _emitterId = 0;
class Emitter {
  constructor() {
    this.id = 'emitter:' + (_emitterId++);
    this._events = {};
    this._destroyed = false;
  }
  on(event, fn) {
    (this._events[event] || (this._events[event] = [])).push(fn);
    return this;
  }
  off(event, fn) {
    if (this._events[event]) this._events[event] = this._events[event].filter(f => f !== fn);
    return this;
  }
  trigger(event, data) {
    const fns = this._events[event];
    if (fns) for (const fn of fns) fn(data);
    return this;
  }
  _onFrameStart(data) { this.trigger('start', data); }
  _onFrameEnd(data) { this.trigger('stop', data); }
  destroy() { this._destroyed = true; this._events = {}; }
}

// 全局共享执行器（Apple sharedRAFExecutorInstance）
const executor = new RAFExecutor();

// ============================================================
// 4. 球面坐标（Apple lat/lon 系统）
// ============================================================
class SphericalCamera {
  constructor() {
    this.lat = 0;  // 纬度 (-90 ~ 90)
    this.lon = 0;  // 经度 (-180 ~ 180)
    this.targetLat = 0;
    this.targetLon = 0;
    this.velLat = 0;
    this.velLon = 0;
    this.distance = 0;
    this.targetDistance = 0;
    // Apple 参数
    this.overshootMultiplier = 1.25;
    this.oscillationDuration = 1600;
    this.oscillationDistance = 12;
  }

  // 球面坐标 → 笛卡尔
  toCartesian() {
    const phi = (90 - this.lat) * Math.PI / 180;
    const theta = (this.lon + 180) * Math.PI / 180;
    const r = this.distance;
    return {
      x: r * Math.sin(phi) * Math.cos(theta),
      y: r * Math.cos(phi),
      z: r * Math.sin(phi) * Math.sin(theta),
    };
  }

  // 拖拽更新（Apple PointerControls 风格）
  drag(dx, dy) {
    this.targetLon += dx * 0.3;
    this.targetLat += dy * 0.3;
    this.targetLat = Math.max(-85, Math.min(85, this.targetLat));
    this.velLon = dx * 0.3;
    this.velLat = dy * 0.3;
  }

  // 每帧更新（Apple overshoot + oscillation）
  update(delta) {
    const dt = delta / 1000;
    const damping = 0.92;
    const spring = 0.08;

    // 弹簧阻尼
    this.velLat += (this.targetLat - this.lat) * spring;
    this.velLon += (this.targetLon - this.lon) * spring;
    this.velLat *= damping;
    this.velLon *= damping;
    this.lat += this.velLat;
    this.lon += this.velLon;

    // 距离插值（平滑）
    this.distance += (this.targetDistance - this.distance) * 0.05;
  }
}

// ============================================================
// 5. 配置
// ============================================================
const LOGO_URL = 'https://img.abdl-space.top/file/1779879250278_ABDL_icon.svg';
const STAR_COUNT = 2500;
const LOGO_STAR_COUNT = 700;
const FLY_DURATION = 5000;
const SPREAD = 1800;
const DEPTH = 3500;
const MAX_LAT = 80;
const PAN_VELOCITY = { slow: 80, fast: 120 };

// ============================================================
// 6. 状态
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
let stars = [];
let logoPointsCache = null;
let camera = new SphericalCamera();
let animProgress = 0;
let cameraProgress = 0;
let isAnimating = false;
let isComplete = false;
let isDragging = false;
let lastPointerX = 0, lastPointerY = 0;
let pointerVelX = 0, pointerVelY = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// 7. SVG Logo 加载
// ============================================================
async function loadLogoPoints(count) {
  if (logoPointsCache) return logoPointsCache;
  try {
    const res = await fetch(LOGO_URL);
    const svgText = await res.text();
    const doc = new DOMParser().parseFromString(svgText, 'image/svg+xml');
    const paths = doc.querySelectorAll('path');
    const vb = doc.querySelector('svg').getAttribute('viewBox').split(/[\s,]+/).map(Number);
    const vbW = vb[2], vbH = vb[3];

    const size = 600;
    const off = document.createElement('canvas');
    off.width = off.height = size;
    const oc = off.getContext('2d');
    oc.scale(size / vbW, size / vbH);
    for (const p of paths) {
      const d = p.getAttribute('d');
      if (d) oc.fill(new Path2D(d));
    }

    const img = oc.getImageData(0, 0, size, size);
    const filled = new Uint8Array(size * size);
    for (let i = 0; i < filled.length; i++) {
      filled[i] = img.data[i * 4 + 3] > 64 ? 1 : 0;
    }

    const edge = [], inner = [];
    for (let y = 1; y < size - 1; y += 2) {
      for (let x = 1; x < size - 1; x += 2) {
        if (!filled[y * size + x]) continue;
        const px = (x - size / 2) * 0.7;
        const py = (y - size / 2) * 0.7;
        if (!filled[(y-1)*size+x] || !filled[(y+1)*size+x] ||
            !filled[y*size+x-1] || !filled[y*size+x+1]) {
          edge.push({ x: px, y: py });
        } else {
          inner.push({ x: px, y: py });
        }
      }
    }

    const result = [];
    const ec = Math.floor(count * 0.75);
    const es = Math.max(1, Math.floor(edge.length / ec));
    for (let i = 0; i < edge.length && result.length < ec; i += es) result.push(edge[i]);
    const is2 = Math.max(1, Math.floor(inner.length / (count - ec)));
    for (let i = 0; i < inner.length && result.length < count; i += is2) result.push(inner[i]);
    while (result.length < count) result.push(edge[Math.floor(Math.random() * edge.length)]);

    logoPointsCache = result.slice(0, count);
    return logoPointsCache;
  } catch (e) {
    console.error(e);
    const r = [];
    for (let i = 0; i < count; i++) {
      const a = (i / count) * Math.PI * 2;
      r.push({ x: Math.cos(a) * 150, y: Math.sin(a) * 150 });
    }
    return r;
  }
}

// ============================================================
// 8. 粒子
// ============================================================
class Star {
  constructor(x, y, z, targetX, targetY) {
    this.homeX = x; this.homeY = y; this.homeZ = z;
    this.x = x; this.y = y; this.z = z;
    this.targetX = targetX; this.targetY = targetY;
    this.isLogo = targetX !== undefined;
    this.size = 0.4 + Math.random() * 1.8;
    this.brightness = 0.2 + Math.random() * 0.8;
    // Apple 风格：每个粒子独立闪烁频率和相位
    this.twinkleSpeed = 0.3 + Math.random() * 2.5;
    this.twinklePhase = Math.random() * Math.PI * 2;
    // 深度颜色偏移
    this.hueShift = Math.random() * 30 - 15;
  }
}

async function initStars() {
  stars = [];
  const logo = await loadLogoPoints(LOGO_STAR_COUNT);
  for (let i = 0; i < LOGO_STAR_COUNT; i++) {
    const lp = logo[i];
    stars.push(new Star(
      (Math.random() - 0.5) * SPREAD,
      (Math.random() - 0.5) * SPREAD,
      Math.random() * DEPTH,
      lp.x, lp.y
    ));
  }
  for (let i = 0; i < STAR_COUNT - LOGO_STAR_COUNT; i++) {
    stars.push(new Star(
      (Math.random() - 0.5) * SPREAD * 2,
      (Math.random() - 0.5) * SPREAD * 2,
      Math.random() * DEPTH
    ));
  }
}

// ============================================================
// 9. 3D 投影
// ============================================================
function project(x, y, z) {
  const fov = 700;
  if (z < -fov + 50) return null;
  const scale = fov / (fov + z);
  const sx = W / 2 + x * scale;
  const sy = H / 2 + y * scale;
  if (sx < -100 || sx > W + 100 || sy < -100 || sy > H + 100) return null;
  return { x: sx, y: sy, scale, z };
}

// ============================================================
// 10. 飞行动画
// ============================================================
function startFly() {
  if (isAnimating) return;
  isAnimating = true;
  animProgress = 0;
  cameraProgress = 0;
  document.getElementById('hint').style.opacity = '0';

  const start = performance.now();
  const MORPH_DELAY = 0.3; // 粒子在相机 30% 后开始成型

  function tick() {
    const elapsed = performance.now() - start;

    // 相机：Apple easeMain 缓动
    cameraProgress = Math.min(1, elapsed / FLY_DURATION);
    camera.targetDistance = DEPTH * (1 - easeMain(cameraProgress)) + 50;

    // 粒子：延迟 + Apple easeSmooth 缓动
    if (cameraProgress >= MORPH_DELAY) {
      const raw = (cameraProgress - MORPH_DELAY) / (1 - MORPH_DELAY);
      animProgress = easeSmooth(Math.min(1, raw));
    }

    document.getElementById('progress').style.width = (cameraProgress * 100) + '%';

    if (cameraProgress < 1) {
      requestAnimationFrame(tick);
    } else {
      isComplete = true;
      isAnimating = false;
      setTimeout(() => {
        document.getElementById('title').classList.add('show');
        document.getElementById('subtitle').classList.add('show');
      }, 400);
    }
  }
  requestAnimationFrame(tick);
}

// ============================================================
// 11. 主渲染（订阅到 RAF 执行器）
// ============================================================
const mainEmitter = new Emitter();
executor.subscribe(mainEmitter);

mainEmitter.on('draw', (data) => {
  ctx.clearRect(0, 0, W, H);

  // 背景
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.8);
  grad.addColorStop(0, '#08080f');
  grad.addColorStop(0.5, '#050508');
  grad.addColorStop(1, '#000000');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 相机位置
  camera.update(data.delta);
  const cam = camera.toCartesian();

  const fov = 700;
  const time = data.time / 1000;
  const deltaS = data.delta / 1000;

  // 排序（远→近）
  const rendered = [];
  for (const s of stars) {
    // 成型插值
    if (s.isLogo) {
      const t = animProgress;
      s.x = s.homeX + (s.targetX - s.homeX) * t;
      s.y = s.homeY + (s.targetY - s.homeY) * t;
      s.z = s.homeZ + (0 - s.homeZ) * t;
    }
    // 相对相机
    const rx = s.x - cam.x;
    const ry = s.y - cam.y;
    const rz = s.z - cam.z;

    const p = project(rx, ry, rz);
    if (!p) continue;

    // 闪烁（Apple 风格：sin 波 + 独立频率/相位）
    const twinkle = 0.5 + 0.5 * Math.sin(time * s.twinkleSpeed + s.twinklePhase);
    let alpha = s.brightness * twinkle * p.scale;

    // Logo 粒子在成型时增亮
    if (s.isLogo && animProgress > 0.3) {
      const boost = (animProgress - 0.3) / 0.7;
      alpha = Math.max(alpha, boost * 0.9 * p.scale);
    }

    const size = s.size * p.scale;
    if (size < 0.2 || alpha < 0.01) continue;

    rendered.push({ sx: p.x, sy: p.y, size, alpha, z: rz, isLogo: s.isLogo, hueShift: s.hueShift });
  }

  rendered.sort((a, b) => b.z - a.z);

  for (const r of rendered) {
    if (r.isLogo && animProgress > 0.5) {
      const hue = 200 + r.hueShift + (r.sx / W) * 100;
      const sat = 60 + animProgress * 30;
      const light = 65 + animProgress * 15;
      ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light}%, ${Math.min(1, r.alpha)})`;
    } else {
      ctx.fillStyle = `rgba(200, 215, 240, ${Math.min(1, r.alpha)})`;
    }
    ctx.beginPath();
    ctx.arc(r.sx, r.sy, Math.max(0.3, r.size), 0, Math.PI * 2);
    ctx.fill();
  }

  // 成型后连线
  if (animProgress > 0.65) {
    const lineAlpha = (animProgress - 0.65) / 0.35 * 0.12;
    ctx.lineWidth = 0.4;
    const logoRendered = rendered.filter(r => r.isLogo);
    for (let i = 0; i < logoRendered.length; i++) {
      const a = logoRendered[i];
      for (let j = i + 1; j < Math.min(i + 6, logoRendered.length); j++) {
        const b = logoRendered[j];
        const dist = Math.hypot(a.sx - b.sx, a.sy - b.sy);
        if (dist < 35) {
          const alpha = lineAlpha * (1 - dist / 35);
          ctx.strokeStyle = `rgba(168, 216, 240, ${alpha})`;
          ctx.beginPath();
          ctx.moveTo(a.sx, a.sy);
          ctx.lineTo(b.sx, b.sy);
          ctx.stroke();
        }
      }
    }
  }
});

// ============================================================
// 12. 输入控制（Apple PointerControls 风格）
// ============================================================
canvas.addEventListener('mousedown', (e) => {
  if (!isComplete) { startFly(); return; }
  isDragging = true;
  lastPointerX = e.clientX;
  lastPointerY = e.clientY;
  pointerVelX = 0;
  pointerVelY = 0;
});

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - lastPointerX;
  const dy = e.clientY - lastPointerY;
  camera.drag(dx, dy);
  pointerVelX = dx;
  pointerVelY = dy;
  lastPointerX = e.clientX;
  lastPointerY = e.clientY;
});

window.addEventListener('mouseup', () => { isDragging = false; });

// 触摸
canvas.addEventListener('touchstart', (e) => {
  if (!isComplete) { startFly(); return; }
  isDragging = true;
  lastPointerX = e.touches[0].clientX;
  lastPointerY = e.touches[0].clientY;
  pointerVelX = 0;
  pointerVelY = 0;
}, { passive: true });

canvas.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  const dx = e.touches[0].clientX - lastPointerX;
  const dy = e.touches[0].clientY - lastPointerY;
  camera.drag(dx, dy);
  pointerVelX = dx;
  pointerVelY = dy;
  lastPointerX = e.touches[0].clientX;
  lastPointerY = e.touches[0].clientY;
}, { passive: true });

canvas.addEventListener('touchend', () => { isDragging = false; });

// 动量衰减（Apple overshoot 风格）
mainEmitter.on('update', (data) => {
  if (isDragging || isAnimating) return;
  // 松手后动量衰减
  camera.targetLon += pointerVelX * 0.15;
  camera.targetLat += pointerVelY * 0.15;
  camera.targetLat = Math.max(-85, Math.min(85, camera.targetLat));
  pointerVelX *= 0.94;
  pointerVelY *= 0.94;
  // 回弹到中心（缓慢）
  camera.targetLat *= 0.998;
  camera.targetLon *= 0.998;
});

// ============================================================
// 13. 启动
// ============================================================
camera.distance = DEPTH + 50;
camera.targetDistance = DEPTH + 50;
initStars().then(() => {
  document.getElementById('hint').textContent = 'CLICK TO BEGIN';
});
</script>
</body>
</html>
